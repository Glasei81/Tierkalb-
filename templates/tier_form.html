{% extends "base.html" %}
{% block title %}Tier hinzufügen{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <h2>➕ Neues Tier</h2>
        
        <form method="POST">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" placeholder="z.B. Bella" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="ohrmarke">Ohrmarke</label>
                <input type="text" id="ohrmarke" name="ohrmarke" placeholder="z.B. DE 123456">
            </div>
            
            <div class="form-group">
                <label for="tierart_id">Tierart</label>
                <select id="tierart_id" name="tierart_id">
                    <option value="">— Wählen —</option>
                    {% for ta in tierarten %}
                    <option value="{{ ta.id }}">{{ ta.emoji }} {{ ta.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="geburtsdatum">Geburtsdatum (optional)</label>
                <input type="date" id="geburtsdatum" name="geburtsdatum">
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn">Speichern</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Abbrechen</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
