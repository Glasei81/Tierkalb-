{% extends 'base.html' %}
{% block title %}{{ 'Tier bearbeiten' if tier else 'Neues Tier' }} — Tierkalb{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="d-flex align-items-center gap-2 mb-3">
      <a href="{{ '/tier/' + tier.id|string if tier else '/dashboard' }}"
         class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h4 class="mb-0 fw-bold">
        {{ 'Tier bearbeiten' if tier else 'Neues Tier' }}
      </h4>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Name *</label>
              <input type="text" name="name" class="form-control"
                     value="{{ tier.name if tier else '' }}" required autofocus>
            </div>
            <div class="col-md-4">
              <label class="form-label">Ohrmarke</label>
              <input type="text" name="ohrmarke" class="form-control"
                     value="{{ tier.ohrmarke if tier else '' }}"
                     placeholder="AT 123456789">
            </div>
            <div class="col-md-6">
              <label class="form-label">Tierart</label>
              <select name="tierart_id" class="form-select">
                <option value="">-- bitte wählen --</option>
                {% for ta in tierarten %}
                <option value="{{ ta.id }}"
                  {{ 'selected' if tier and tier.tierart_id == ta.id }}>
                  {{ ta.emoji }} {{ ta.name }}
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Geschlecht</label>
              <select name="geschlecht" class="form-select">
                <option value="weiblich" {{ 'selected' if not tier or tier.get('geschlecht') == 'weiblich' }}>Weiblich</option>
                <option value="männlich" {{ 'selected' if tier and tier.get('geschlecht') == 'männlich' }}>Männlich</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Geburtsdatum</label>
              <input type="date" name="geburtsdatum" class="form-control"
                     value="{{ tier.geburtsdatum if tier else '' }}">
            </div>
            {% if tier %}
            <div class="col-md-6">
              <label class="form-label">Status</label>
              <select name="status" class="form-select">
                <option value="Aktiv" {{ 'selected' if tier.status == 'Aktiv' }}>Aktiv</option>
                <option value="Archiviert" {{ 'selected' if tier.status == 'Archiviert' }}>Archiviert</option>
              </select>
            </div>
            {% endif %}
            <div class="col-12">
              <label class="form-label">Notiz</label>
              <textarea name="notiz" class="form-control" rows="2"
                        placeholder="Interne Notiz...">{{ tier.notiz if tier else '' }}</textarea>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> Speichern
            </button>
            <a href="{{ '/tier/' + tier.id|string if tier else '/dashboard' }}"
               class="btn btn-outline-secondary">Abbrechen</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
