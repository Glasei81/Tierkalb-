{% extends 'base.html' %}
{% block title %}Kosten eintragen — Tierkalb{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="d-flex align-items-center gap-2 mb-3">
      <a href="/tier/{{ tier.id }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h4 class="mb-0 fw-bold">
        {{ tier.emoji or '🐄' }} {{ tier.name }} — Kosten eintragen
      </h4>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Kostenart *</label>
            <div class="row g-2">
              {% for typ in KOSTEN_TYPEN %}
              <div class="col-6 col-md-4">
                <input type="radio" class="btn-check" name="typ"
                       id="ktyp_{{ typ }}" value="{{ typ }}"
                       {{ 'checked' if loop.first }}>
                <label class="btn btn-outline-primary w-100" for="ktyp_{{ typ }}">
                  {{ typ }}
                </label>
              </div>
              {% endfor %}
            </div>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label fw-semibold">Betrag (EUR) *</label>
              <div class="input-group">
                <input type="text" name="betrag" class="form-control"
                       placeholder="0.00" required>
                <span class="input-group-text">€</span>
              </div>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Datum *</label>
              <input type="date" name="datum" class="form-control"
                     value="{{ heute }}" required>
            </div>
          </div>
          <div class="mb-4 mt-3">
            <label class="form-label fw-semibold">Notiz (optional)</label>
            <textarea name="notiz" class="form-control" rows="2"
                      placeholder="z.B. Tierarzt Hausbesuch, Diagnose ..."></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> Speichern
            </button>
            <a href="/tier/{{ tier.id }}" class="btn btn-outline-secondary">Abbrechen</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
